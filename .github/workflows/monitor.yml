# Manual smoke test only. Scheduled monitoring runs via launchd on a local
# Mac (see README "Background Monitor"); a GitHub Actions cron is the wrong
# host because GitHub auto-disables schedules after 60 days of repo
# inactivity, which silently killed monitoring from 2026-04-23 onward, and
# the run below uses the example watchlist rather than a real one.
name: Bounty Monitor

on:
  workflow_dispatch: # Manual smoke-test runs only

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Prepare data directory
        run: mkdir -p ~/.bounty-hunter

      - name: Copy watchlist config
        run: cp watchlist.example.yml ~/.bounty-hunter/watchlist.yml

      - name: Restore seen.json from cache
        id: seen-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.bounty-hunter/seen.json
          key: seen-state

      - name: Run monitor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node dist/monitor.js

      - name: Save seen.json to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.bounty-hunter/seen.json
          key: seen-state-${{ github.run_id }}
