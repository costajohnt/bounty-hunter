# Bounty Hunter Watchlist Configuration
#
# Edit this file to add/remove repos and bounty sources.
# Telegram secrets are injected from environment variables at runtime
# (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID) — the values below are placeholders.

polling_interval: 15

telegram:
  bot_token: "set-via-env"
  chat_id: "set-via-env"

# Freshness & claimed-bounty filters (all optional — defaults shown)
filters:
  max_age_days: 7              # Ignore issues older than N days (0 = disabled)
  skip_assigned: true          # Skip GitHub issues with assignees
  claimed_labels:              # Skip GitHub issues with these labels (case-insensitive)
    - Reviewing
    - Approved
    - Assigned
    - Under Review
    - In Progress
  max_comment_count: 5         # Skip GitHub issues with >= N comments (0 = disabled)

# Deep issue vetting (all optional — defaults shown)
# Runs after cheap filters, analyzes issue body + fetched comments
vetting:
  enabled: true                # Master toggle for vetting
  on_fail: "skip"              # "skip" = silent drop, "warn" = notify with warning, "notify_all" = ignore failures
  max_proposals: 3             # Fail if >= N proposals already exist (0 = disabled)
  require_bounty_label: false  # Require bounty amount OR label to pass
  bounty_labels:               # Labels that confirm a bounty (when require_bounty_label is true)
    - "Help Wanted"
  access_keywords:             # Keywords indicating internal/private access required
    - "staging server"
    - "staging environment"
    - "internal tool"
    - "internal slack"
    - "internal stack overflow"
    - "stackoverflow.com/c/"
    - "vpn"
    - "internal wiki"
    - "century"
    - "admin console"
    - "internal dashboard"
    - "dev environment"
    - "test account provided"
  platform_keywords: []        # Keywords for platform-specific requirements (e.g., "iOS", "Android")
  proposal_patterns:           # Patterns that identify a proposal comment
    - "## Proposal"
    - "### Please re-state the problem"

sources:
  repos:
    - name: Expensify/App
      labels:
        - "Help Wanted"
      proposal_template: expensify
      pre_filter:
        keywords_exclude:
          - "NewDot"

  algora:
    enabled: true
    min_bounty: 50
    languages: []
    keywords_exclude: []
